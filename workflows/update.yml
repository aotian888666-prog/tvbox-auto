name: tvbox-speed-auto

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install
        run: pip install requests

      - name: build
        run: python core/builder.py

      - name: commit
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "auto speed update" || exit 0
          git push
